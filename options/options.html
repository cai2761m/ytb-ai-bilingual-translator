<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube 双语字幕设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header>
        <h1>YouTube 双语字幕</h1>
        <p>填写 DeepSeek API Key 后，插件会在 YouTube 播放页预翻译英文字幕并显示中英双语字幕。</p>
      </header>

      <form id="settings-form" class="panel">
        <label class="field">
          <span>DeepSeek API Key</span>
          <input id="deepseekApiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>

        <div class="grid">
          <label class="field">
            <span>源语言</span>
            <select id="sourceLanguage">
              <option value="en">English</option>
            </select>
          </label>

          <label class="field">
            <span>目标语言</span>
            <select id="targetLanguage">
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁体中文</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>字幕大小 <strong id="fontScaleValue">1.0x</strong></span>
          <input id="fontScale" type="range" min="0.7" max="1.8" step="0.1">
        </label>

        <label class="toggle">
          <input id="subtitleEnabled" type="checkbox">
          <span>启用插件字幕并屏蔽 YouTube 原生 CC 字幕</span>
        </label>

        <div class="actions">
          <button type="submit">保存设置</button>
          <button id="clear-cache" type="button" class="secondary">清空翻译缓存</button>
        </div>

        <p id="status" class="status" role="status"></p>
      </form>

      <section class="notes">
        <h2>使用说明</h2>
        <p>插件依赖 YouTube 播放器页面提供的英文字幕轨道。如果视频没有英文自动字幕或英文字幕，插件会提示未找到字幕。</p>
      </section>
    </main>

    <script src="../src/shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
