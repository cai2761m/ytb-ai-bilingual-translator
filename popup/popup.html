<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AuraTranslate</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div>
          <h1>AuraTranslate</h1>
          <p>配置实时字幕翻译和沉浸式网页翻译。</p>
        </div>
        <button id="open-settings" type="button" class="secondary compact">设置</button>
      </header>

      <section class="panel">
        <label class="popup-toggle">
          <span>
            <strong>启用 YouTube 实时翻译</strong>
            <small>开启后自动显示中英双语字幕，并隐藏 YouTube 原生 CC 字幕。</small>
          </span>
          <input id="subtitle-enabled-toggle" type="checkbox">
        </label>
      </section>

      <section class="panel quick-status">
        <strong>使用方式</strong>
        <p>YouTube 页面自动显示实时双语字幕；普通网页右侧小圆球点击后生成中英对照翻译。</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
